<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="140" y="200" width="744" height="550" rx="30" fill="#0f172a" stroke="#334155" stroke-width="4"/>
  <!-- Title bar -->
  <rect x="140" y="200" width="744" height="60" rx="30" fill="#1e293b"/>
  <rect x="140" y="230" width="744" height="30" fill="#1e293b"/>
  <!-- Traffic lights -->
  <circle cx="200" cy="230" r="12" fill="#ef4444"/>
  <circle cx="240" cy="230" r="12" fill="#eab308"/>
  <circle cx="280" cy="230" r="12" fill="#22c55e"/>
  <!-- Docker whale shape (simplified) -->
  <g transform="translate(340, 350)">
    <!-- Container boxes -->
    <rect x="0" y="80" width="60" height="50" rx="6" fill="url(#accent)" opacity="0.9"/>
    <rect x="70" y="80" width="60" height="50" rx="6" fill="url(#accent)" opacity="0.9"/>
    <rect x="140" y="80" width="60" height="50" rx="6" fill="url(#accent)" opacity="0.9"/>
    <rect x="210" y="80" width="60" height="50" rx="6" fill="url(#accent)" opacity="0.7"/>
    <rect x="70" y="20" width="60" height="50" rx="6" fill="url(#accent)" opacity="0.7"/>
    <rect x="140" y="20" width="60" height="50" rx="6" fill="url(#accent)" opacity="0.7"/>
    <rect x="140" y="-40" width="60" height="50" rx="6" fill="url(#accent)" opacity="0.5"/>
  </g>
  <!-- SSH text -->
  <text x="512" y="680" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="48" font-weight="bold">SSH ADMIN</text>
</svg>
